version = 0.1

[default]
[default.global.parameters]
stack_name = "pr-redirect-service"
resolve_s3 = true
s3_prefix = "pr-redirect-service"

[default.build.parameters]
cached = true
parallel = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = true
resolve_s3 = true
parameter_overrides = [
    "DomainName=short.panelretter.de",
    "HostedZoneId=YOUR_HOSTED_ZONE_ID",
    "CertificateArn=YOUR_CERTIFICATE_ARN",
    "RedirectBucket=YOUR_REDIRECT_BUCKET",
    "RedirectKey=redirects.json",
    "DefaultRedirectUrl=https://panelretter.de"
]
