version = 0.1

[default]
[default.global.parameters]
stack_name = "pr-redirect-service"
resolve_s3 = true
s3_prefix = "pr-redirect-service"
region = "eu-central-1"


[default.build.parameters]
cached = true
parallel = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = true
resolve_s3 = true
parameter_overrides = [
    "DomainName=short.your-domain.de",
    "HostedZoneId=YOUR_HOSTED_ZONE_ID",
    "CertificateArn=arn:aws:acm:eu-central-1:123456789012:certificate/your-cert-id",
    "DefaultRedirectUrl=https://your-default-redirect.de"
]
