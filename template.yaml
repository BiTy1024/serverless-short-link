AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Redirect service for short.panelretter.de

Parameters:
  DomainName:
    Type: String
    Default: short.panelretter.de
    Description: Custom domain name for the redirect service
  
  HostedZoneId:
    Type: String
    Description: Route53 Hosted Zone ID for panelretter.de
  
  CertificateArn:
    Type: String
    Description: ACM Certificate ARN for short.panelretter.de (must be in same region)
  
  DefaultRedirectUrl:
    Type: String
    Default: https://example.de
    Description: Fallback URL when no mapping is found

Globals:
  Function:
    Timeout: 10
    MemorySize: 256
    Runtime: python3.12
    Architectures:
      - arm64

Resources:
  LinksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: short_path
          AttributeType: S
      KeySchema:
        - AttributeName: short_path
          KeyType: HASH
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-links

  RedirectStatsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: redirect_path
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: redirect_path
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-redirect-stats

  # --- Cognito ---

  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub ${AWS::StackName}-users
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      Policies:
        PasswordPolicy:
          MinimumLength: 8

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref CognitoUserPool
      ClientName: !Sub ${AWS::StackName}-web
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_ADMIN_USER_PASSWORD_AUTH


  # --- Cross-region ACM Certificate for admin frontend ---

  AdminCertFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-admin-cert
      CodeUri: src/cert/
      Handler: handler.lambda_handler
      Description: Custom resource to create ACM certificate in us-east-1 for cloudfront
      Timeout: 300
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - acm:RequestCertificate
                - acm:DescribeCertificate
                - acm:DeleteCertificate
              Resource: '*'
            - Effect: Allow
              Action:
                - route53:ChangeResourceRecordSets
                - route53:GetHostedZone
              Resource: !Sub arn:aws:route53:::hostedzone/${HostedZoneId}

  AdminCertificate:
    Type: Custom::AdminCertificate
    Properties:
      ServiceToken: !GetAtt AdminCertFunction.Arn
      DomainName: !Sub admin.${DomainName}
      HostedZoneId: !Ref HostedZoneId

  # --- Lambda Functions ---

  RedirectFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-redirect
      CodeUri: src/redirect/
      Handler: handler.lambda_handler
      Description: Handles URL redirects based on DynamoDB lookup
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: redirect
          POWERTOOLS_LOG_LEVEL: INFO
          LINKS_TABLE_NAME: !Ref LinksTable
          DEFAULT_REDIRECT_URL: !Ref DefaultRedirectUrl
          STATS_TABLE_NAME: !Ref RedirectStatsTable
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource: !GetAtt LinksTable.Arn
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource: !GetAtt RedirectStatsTable.Arn
      Events:
        RootPath:
          Type: HttpApi
          Properties:
            ApiId: !Ref RedirectHttpApi
            Path: /
            Method: ANY
            Auth:
              Authorizer: NONE
        ProxyPath:
          Type: HttpApi
          Properties:
            ApiId: !Ref RedirectHttpApi
            Path: /{proxy+}
            Method: ANY
            Auth:
              Authorizer: NONE

  LinksFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-links-api
      CodeUri: src/links/
      Handler: handler.lambda_handler
      Description: CRUD API for managing short links
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: links
          POWERTOOLS_LOG_LEVEL: INFO
          LINKS_TABLE_NAME: !Ref LinksTable
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:GetItem
                - dynamodb:DeleteItem
                - dynamodb:Scan
                - dynamodb:UpdateItem
              Resource: !GetAtt LinksTable.Arn
      Events:
        ListLinks:
          Type: HttpApi
          Properties:
            ApiId: !Ref RedirectHttpApi
            Path: /api/links
            Method: GET
        CreateLink:
          Type: HttpApi
          Properties:
            ApiId: !Ref RedirectHttpApi
            Path: /api/links
            Method: POST
        UpdateLink:
          Type: HttpApi
          Properties:
            ApiId: !Ref RedirectHttpApi
            Path: /api/links/{path}
            Method: PUT
        DeleteLink:
          Type: HttpApi
          Properties:
            ApiId: !Ref RedirectHttpApi
            Path: /api/links/{path}
            Method: DELETE

  StatsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-stats-api
      CodeUri: src/stats/
      Handler: handler.lambda_handler
      Description: API for querying click statistics
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: stats
          POWERTOOLS_LOG_LEVEL: INFO
          STATS_TABLE_NAME: !Ref RedirectStatsTable
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
                - dynamodb:Scan
              Resource: !GetAtt RedirectStatsTable.Arn
      Events:
        StatsOverview:
          Type: HttpApi
          Properties:
            ApiId: !Ref RedirectHttpApi
            Path: /api/stats
            Method: GET
        StatsDetail:
          Type: HttpApi
          Properties:
            ApiId: !Ref RedirectHttpApi
            Path: /api/stats/{path}
            Method: GET

  RedirectHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              issuer: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPool}
              audience:
                - !Ref CognitoUserPoolClient
      CorsConfiguration:
        AllowOrigins:
          - !Sub "https://admin.${DomainName}"
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
        MaxAge: 3600
      RouteSettings:
        "GET /api/links":
          ThrottlingBurstLimit: 50
          ThrottlingRateLimit: 100
        "POST /api/links":
          ThrottlingBurstLimit: 50
          ThrottlingRateLimit: 100
        "PUT /api/links/{path}":
          ThrottlingBurstLimit: 50
          ThrottlingRateLimit: 100
        "DELETE /api/links/{path}":
          ThrottlingBurstLimit: 50
          ThrottlingRateLimit: 100
        "GET /api/stats":
          ThrottlingBurstLimit: 50
          ThrottlingRateLimit: 100
        "GET /api/stats/{path}":
          ThrottlingBurstLimit: 50
          ThrottlingRateLimit: 100
      Domain:
        DomainName: !Ref DomainName
        CertificateArn: !Ref CertificateArn
        Route53:
          HostedZoneId: !Ref HostedZoneId

  RedirectFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${RedirectFunction}
      RetentionInDays: 14

  LinksFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${LinksFunction}
      RetentionInDays: 14

  StatsFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${StatsFunction}
      RetentionInDays: 14

  AdminCertFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${AdminCertFunction}
      RetentionInDays: 14

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${RedirectHttpApi}.execute-api.${AWS::Region}.amazonaws.com
    Export:
      Name: !Sub ${AWS::StackName}-ApiEndpoint
  
  CustomDomainUrl:
    Description: Custom domain URL
    Value: !Sub https://${DomainName}
    Export:
      Name: !Sub ${AWS::StackName}-CustomDomain
  
  RedirectFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt RedirectFunction.Arn
    Export:
      Name: !Sub ${AWS::StackName}-FunctionArn
  
  RedirectFunctionName:
    Description: Lambda function name
    Value: !Ref RedirectFunction
    Export:
      Name: !Sub ${AWS::StackName}-FunctionName
  
  StatsTableName:
    Description: DynamoDB table name for redirect statistics
    Value: !Ref RedirectStatsTable
    Export:
      Name: !Sub ${AWS::StackName}-StatsTableName

  LinksTableName:
    Description: DynamoDB table name for links
    Value: !Ref LinksTable
    Export:
      Name: !Sub ${AWS::StackName}-LinksTableName

  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref CognitoUserPool
    Export:
      Name: !Sub ${AWS::StackName}-UserPoolId

  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref CognitoUserPoolClient
    Export:
      Name: !Sub ${AWS::StackName}-UserPoolClientId

  AdminDomainUrl:
    Description: Admin frontend URL
    Value: !Sub https://admin.${DomainName}

  AdminCertificateArn:
    Description: ACM Certificate ARN for admin domain (us-east-1)
    Value: !GetAtt AdminCertificate.CertificateArn
